<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="800">Vaultrix Architecture</text>
  <text x="450" y="60" text-anchor="middle" fill="#64748b" font-size="12">Five-Layer Defence-in-Depth for Autonomous AI Agents</text>

  <!-- Layer 1: User / Input -->
  <rect x="50" y="80" width="800" height="70" rx="12" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <rect x="60" y="90" width="120" height="50" rx="8" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1"/>
  <text x="120" y="110" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="700">LAYER 1</text>
  <text x="120" y="128" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Input Validation</text>

  <rect x="200" y="90" width="200" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="300" y="112" text-anchor="middle" fill="#94a3b8" font-size="11">User Goal / API Request</text>
  <text x="300" y="128" text-anchor="middle" fill="#64748b" font-size="9">Sanitize &amp; classify risk</text>

  <rect x="420" y="90" width="200" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="520" y="112" text-anchor="middle" fill="#94a3b8" font-size="11">CLI / Dashboard / API</text>
  <text x="520" y="128" text-anchor="middle" fill="#64748b" font-size="9">vaultrix.cli + ui.dashboard</text>

  <rect x="640" y="90" width="200" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="740" y="112" text-anchor="middle" fill="#94a3b8" font-size="11">Action Classifier</text>
  <text x="740" y="128" text-anchor="middle" fill="#64748b" font-size="9">LOW / MEDIUM / HIGH / CRITICAL</text>

  <!-- Arrow down -->
  <path d="M450 150 L450 170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#475569"/></marker></defs>

  <!-- Layer 2: Permissions -->
  <rect x="50" y="175" width="800" height="70" rx="12" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <rect x="60" y="185" width="120" height="50" rx="8" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
  <text x="120" y="205" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="700">LAYER 2</text>
  <text x="120" y="223" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Permissions</text>

  <rect x="200" y="185" width="160" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="280" y="207" text-anchor="middle" fill="#94a3b8" font-size="11">PermissionManager</text>
  <text x="280" y="223" text-anchor="middle" fill="#64748b" font-size="9">5 levels x 6 resource types</text>

  <rect x="375" y="185" width="140" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="445" y="207" text-anchor="middle" fill="#94a3b8" font-size="11">Rate Limiter</text>
  <text x="445" y="223" text-anchor="middle" fill="#64748b" font-size="9">per-resource buckets</text>

  <rect x="530" y="185" width="140" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="600" y="207" text-anchor="middle" fill="#94a3b8" font-size="11">Path Checker</text>
  <text x="600" y="223" text-anchor="middle" fill="#64748b" font-size="9">traversal-safe matching</text>

  <rect x="685" y="185" width="155" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="762" y="207" text-anchor="middle" fill="#94a3b8" font-size="11">Audit Logger</text>
  <text x="762" y="223" text-anchor="middle" fill="#64748b" font-size="9">full access history</text>

  <!-- Arrow down -->
  <path d="M450 245 L450 265" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: HITL -->
  <rect x="50" y="270" width="800" height="70" rx="12" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <rect x="60" y="280" width="120" height="50" rx="8" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="120" y="300" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700">LAYER 3</text>
  <text x="120" y="318" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Human Approval</text>

  <rect x="200" y="280" width="200" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="300" y="302" text-anchor="middle" fill="#94a3b8" font-size="11">HITL Gate</text>
  <text x="300" y="318" text-anchor="middle" fill="#64748b" font-size="9">HIGH/CRITICAL pause for human</text>

  <rect x="420" y="280" width="200" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="520" y="302" text-anchor="middle" fill="#94a3b8" font-size="11">Approval Queue</text>
  <text x="520" y="318" text-anchor="middle" fill="#64748b" font-size="9">timeout + fallback logic</text>

  <rect x="640" y="280" width="200" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="740" y="302" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">LOW: auto</text>
  <text x="740" y="318" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">MED+: confirm</text>

  <!-- Arrow down -->
  <path d="M450 340 L450 360" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: Sandbox -->
  <rect x="50" y="365" width="800" height="70" rx="12" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <rect x="60" y="375" width="120" height="50" rx="8" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1"/>
  <text x="120" y="395" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="700">LAYER 4</text>
  <text x="120" y="413" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Sandbox</text>

  <rect x="200" y="375" width="145" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="272" y="397" text-anchor="middle" fill="#94a3b8" font-size="11">SandboxManager</text>
  <text x="272" y="413" text-anchor="middle" fill="#64748b" font-size="9">Docker / Local backend</text>

  <rect x="360" y="375" width="145" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="432" y="397" text-anchor="middle" fill="#94a3b8" font-size="11">Isolated FS</text>
  <text x="432" y="413" text-anchor="middle" fill="#64748b" font-size="9">temp workspace per agent</text>

  <rect x="520" y="375" width="145" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="592" y="397" text-anchor="middle" fill="#94a3b8" font-size="11">Resource Limits</text>
  <text x="592" y="413" text-anchor="middle" fill="#64748b" font-size="9">CPU / mem / PID / net</text>

  <rect x="680" y="375" width="160" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="760" y="397" text-anchor="middle" fill="#94a3b8" font-size="11">Agent Runtime</text>
  <text x="760" y="413" text-anchor="middle" fill="#64748b" font-size="9">ReAct loop + tool use</text>

  <!-- Arrow down -->
  <path d="M450 435 L450 455" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 5: Encryption -->
  <rect x="50" y="460" width="800" height="70" rx="12" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <rect x="60" y="470" width="120" height="50" rx="8" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="490" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">LAYER 5</text>
  <text x="120" y="508" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Encryption</text>

  <rect x="200" y="470" width="200" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="300" y="492" text-anchor="middle" fill="#94a3b8" font-size="11">EncryptionManager</text>
  <text x="300" y="508" text-anchor="middle" fill="#64748b" font-size="9">Fernet (AES-128-CBC + HMAC)</text>

  <rect x="420" y="470" width="200" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="520" y="492" text-anchor="middle" fill="#94a3b8" font-size="11">Key Management</text>
  <text x="520" y="508" text-anchor="middle" fill="#64748b" font-size="9">~/.vaultrix/key (0600)</text>

  <rect x="640" y="470" width="200" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="740" y="492" text-anchor="middle" fill="#94a3b8" font-size="11">Encrypted Storage</text>
  <text x="740" y="508" text-anchor="middle" fill="#64748b" font-size="9">agent data, logs, memory</text>

  <!-- VaultHub at bottom -->
  <rect x="200" y="550" width="500" height="50" rx="10" fill="#0f172a" stroke="#818cf8" stroke-width="1.5"/>
  <text x="450" y="572" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">VaultHub  —  Audited Skill Registry</text>
  <text x="450" y="588" text-anchor="middle" fill="#64748b" font-size="10">AST scanner + manual review + cryptographic signing</text>

  <!-- Connecting lines to VaultHub -->
  <path d="M350 530 L350 550" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>
  <path d="M550 530 L550 550" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>
</svg>
